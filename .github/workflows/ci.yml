name: CI Verification

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install Dependencies
        run: |
          cd extension
          npm ci

      - name: Run Linter
        run: |
          cd extension
          npm run lint

      - name: Run Build
        run: |
          cd extension
          npm run build
